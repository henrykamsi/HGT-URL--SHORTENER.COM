<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGT 404 Error</title>
    <style>
        /* Color Palette & Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            color: #002366; /* Dark Blue Text */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        header {
            width: 100%;
            text-align: center;
            padding-top: 20px;
        }

        header h1 {
            color: #002366;
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        main {
            text-align: center;
            max-width: 500px;
        }

        .error-code {
            font-size: 5rem;
            font-weight: bold;
            margin: 0;
        }

        .message {
            font-size: 1.2rem;
            margin: 20px 0;
            line-height: 1.5;
        }

        .button-group {
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            cursor: pointer;
            background-color: #002366;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #003399;
        }

        footer {
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #002366;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>HGT Error Message</h1>
    </header>

    <main>
        <p class="error-code">404</p>
        <p class="message">
            Oops! It seems like this site is removed, broken, or you might have a network issue⛅🌩🌧🌩🌧🌩🌧⛅. 
            Please check your internet connection and try again later.
        </p>
        
        <div class="button-group">
            <button onclick="window.location.href='index.html'">Home</button>
            
            <button onclick="window.location.reload()">Refresh</button>
        </div>
    </main>

    <footer>
        <p>HGT All Rights Reserved | Henry Global Tech Industry | HGT Copyright 2026</p>
    </footer>

</body>
</html>
